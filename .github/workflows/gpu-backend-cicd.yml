name: GPU Backend CD

on:
  workflow_call:
    inputs:
      backend:
        description: "GPU backend to validate"
        required: false
        type: string
        default: "all"
      strict_self_hosted:
        description: "Run strict checks on self-hosted GPU runners"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      backend:
        description: "GPU backend to validate"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - cuda
          - rocm_hip
          - oneapi_sycl
          - opencl
          - vulkan_compute
          - metal
      strict_self_hosted:
        description: "Run strict checks on self-hosted GPU runners"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * 2"

permissions:
  contents: read

concurrency:
  group: gpu-backend-cicd-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  hosted-report:
    name: GPU Backend Hosted Report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sparkc (hosted probe)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSPARK_BUILD_TESTS=OFF
          cmake --build build --parallel 4 --target sparkc
      - name: Resolve requested backend
        id: requested
        run: |
          backend="${{ inputs.backend }}"
          if [ -z "$backend" ]; then
            backend="all"
          fi
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
      - name: Hosted GPU smoke matrix (report mode)
        run: |
          python scripts/core/platform/runtime/gpu_smoke_matrix.py \
            --backends "${{ steps.requested.outputs.backend }}" \
            --include-planning \
            --json-out bench/results/gpu_backend_cicd_hosted_smoke.json
      - name: Hosted GPU runtime probe (best-effort)
        run: |
          python scripts/core/platform/runtime/gpu_backend_runtime_perf.py \
            --program bench/programs/matmul_schedule_gpu/matmul_core_f64.k \
            --backends "${{ steps.requested.outputs.backend }}" \
            --runs 1 \
            --warmup 0 \
            --max-perf \
            --allow-missing-runtime \
            --json-out bench/results/gpu_backend_cicd_hosted_runtime.json \
            --csv-out bench/results/gpu_backend_cicd_hosted_runtime.csv || true
      - name: Upload hosted GPU report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gpu-backend-hosted-report
          path: |
            bench/results/gpu_backend_cicd_hosted_smoke.json
            bench/results/gpu_backend_cicd_hosted_runtime.json
            bench/results/gpu_backend_cicd_hosted_runtime.csv
          if-no-files-found: warn

  cuda:
    if: ${{ inputs.strict_self_hosted && (inputs.backend == 'all' || inputs.backend == 'cuda') }}
    runs-on: ${{ matrix.labels }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: cuda
            labels: [self-hosted, linux, x64, gpu, cuda]
          - backend: cuda
            labels: [self-hosted, windows, x64, gpu, cuda]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare CUDA infra
        run: |
          python scripts/core/platform/runtime/gpu_backend_infra.py \
            --backends cuda \
            --provision \
            --strict \
            --json-out bench/results/platform_support_gpu_infra_${{ matrix.labels[0] }}_${{ matrix.backend }}.json
      - name: CUDA strict smoke
        run: |
          python scripts/core/platform/runtime/gpu_smoke_matrix.py \
            --backends cuda \
            --fail-on-unavailable cuda \
            --json-out bench/results/platform_support_gpu_smoke_${{ matrix.labels[0] }}_${{ matrix.backend }}.json
      - name: Upload CUDA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gpu-backend-cuda-${{ matrix.labels[0] }}
          path: |
            bench/results/platform_support_gpu_infra_${{ matrix.labels[0] }}_${{ matrix.backend }}.json
            bench/results/platform_support_gpu_smoke_${{ matrix.labels[0] }}_${{ matrix.backend }}.json
          if-no-files-found: warn

  rocm:
    if: ${{ inputs.strict_self_hosted && (inputs.backend == 'all' || inputs.backend == 'rocm_hip') }}
    runs-on: [self-hosted, linux, x64, gpu, rocm]
